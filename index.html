<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #e6edf3; padding: 20px 24px 40px; min-height: 100vh; }
.dash-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid #21262d; flex-wrap:wrap; gap:12px; }
.dash-title { font-size:20px; font-weight:700; color:#f0f6fc; }

.header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }

.btn:hover { background:#30363d; }

.date-bar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:#161b22; border:1px solid #21262d; border-radius:10px; padding:10px 14px; margin-bottom:20px; }

.date-preset-btn:hover { background:#21262d; color:#e6edf3; }
.date-preset-btn.active { background:#1f3a5f; border-color:#1f6feb88; color:#58a6ff; font-weight:600; }

.date-custom-wrap.visible { display:flex; }

.kpi:hover { border-color:#388bfd55; }
.kpi-label { font-size:10px; color:#8b949e; text-transform:uppercase; letter-spacing:0.6px; margin-bottom:7px; }
.kpi-val { font-size:22px; font-weight:700; color:#f0f6fc; line-height:1; }
.kpi-sub { font-size:10px; color:#6e7681; margin-top:5px; }
.c-blue{color:#58a6ff} .c-green{color:#3fb950} .c-red{color:#f85149} .c-yellow{color:#e3b341} .c-purple{color:#d2a8ff} .c-gray{color:#8b949e} .c-orange{color:#f0883e}

.chart-row { display:grid; gap:14px; margin-bottom:14px; }
.chart-2 { grid-template-columns:2fr 1fr; }

@media(max-width:700px){.chart-2,.chart-11{grid-template-columns:1fr}}
.chart-card { background:#161b22; border:1px solid #21262d; border-radius:10px; padding:16px; }

.chart-wrap { position:relative; height:200px; }
.chart-wrap-tall { position:relative; height:260px; }

.tbl-card { background:#161b22; border:1px solid #21262d; border-radius:10px; padding:16px; overflow-x:auto; margin-bottom:14px; }
table { width:100%; border-collapse:collapse; font-size:11px; }
thead th { background:#0d1117; color:#6e7681; text-align:right; padding:7px 10px; border-bottom:1px solid #21262d; text-transform:uppercase; font-size:10px; letter-spacing:0.5px; font-weight:600; white-space:nowrap; }
thead th:first-child { text-align:left; }
tbody td { padding:7px 10px; border-bottom:1px solid #21262d; text-align:right; color:#e6edf3; white-space:nowrap; }
tbody td:first-child { text-align:left; color:#f0f6fc; max-width:200px; overflow:hidden; text-overflow:ellipsis; }
tbody tr:last-child td { border-bottom:none; }

.team-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
@media(max-width:700px){ .team-grid { grid-template-columns:1fr; } }

.insights-card { background:#161b22; border:1px solid #1f6feb44; border-radius:10px; padding:4px 16px; }

.center-box { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:400px; gap:14px; }

@keyframes spin { to { transform:rotate(360deg); } }
.loading-label { color:#8b949e; font-size:13px; }

.kw-badge { display:inline-block; padding:2px 7px; border-radius:10px; font-size:10px; font-weight:600; background:#1f3a5f; color:#58a6ff; border:1px solid #1f6feb44; }
.data-source-badge { font-size:10px; color:#6e7681; margin-left:8px; }

<body>
<div id="app">
  <div class="center-box"><div class="spinner"></div><div class="loading-label" id="load-msg">Loading…</div></div>
</div>
<script>
/* ── CONFIG ── */
const WINDSOR_KEY = 'fcfb6b6412b361cec3e773facf01b656b06d';
const GHL_ACC     = 'cDflRENlp3PnNAba1tYW';
const GADS_ACC    = '370-923-9676';
const GA4_ACC     = '396222340';
const BASE        = 'https://connectors.windsor.ai';
const SALES_JSON  = './sales-data.json';

Chart.defaults.color = '#6e7681';
Chart.defaults.borderColor = '#21262d';
Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
Chart.defaults.font.size = 11;

const CHARTS = {};
function destroyCharts() {
  Object.values(CHARTS).forEach(c => { try { c.destroy(); } catch(_){} });
  Object.keys(CHARTS).forEach(k => delete CHARTS[k]);
}

/* ── DATE HELPERS ── */
function toISO(d) { return d.toISOString().slice(0,10); }
function today()     { return toISO(new Date()); }
function yesterday() { const d=new Date(); d.setDate(d.getDate()-1); return toISO(d); }
function daysAgo(n)  { const d=new Date(); d.setDate(d.getDate()-n); return toISO(d); }

let dateConfig = { preset:'yesterday', from:yesterday(), to:yesterday() };

function dateLabel() {
  const p=dateConfig.preset;
  if (p==='today')     return 'Today';
  if (p==='yesterday') return 'Yesterday (' + yesterday() + ')';
  if (p==='last_7d')   return 'Last 7 days';
  if (p==='last_30d')  return 'Last 30 days';
  return dateConfig.from + ' → ' + dateConfig.to;
}

/* ── FILL DATE RANGE ── */
function fillDateRange(obj, defaultVal) {
  const result={};
  const cur=new Date(dateConfig.from), end=new Date(dateConfig.to);
  while(cur<=end){
    const d=cur.toISOString().slice(0,10);
    result[d]=obj[d]!==undefined?obj[d]:(typeof defaultVal==='object'?{...defaultVal}:defaultVal);
    cur.setDate(cur.getDate()+1);
  }
  return result;
}

/* ── WINDSOR FETCH ── */
async function windsorFetch(connector, accountId, fields, from, to) {
  const f=from||dateConfig.from, t=to||dateConfig.to;
  const params=new URLSearchParams({ api_key:WINDSOR_KEY, date_from:f, date_to:t, fields:fields.join(','), account_id:accountId });
  const res=await fetch(`${BASE}/${connector}?${params}`);
  if(!res.ok) throw new Error(`Windsor ${connector} HTTP ${res.status}`);
  const json=await res.json();
  return Array.isArray(json)?json:(json.data||json.result||[]);
}

/* ── SALES DATA FETCH ── */
async function fetchSalesData() {
  try {
    const res = await fetch(SALES_JSON + '?t=' + Date.now());
    if (!res.ok) return { transactions:[], lastUpdated:'—', source:'unavailable' };
    const data = await res.json();
    return { ...data, source:'file' };
  } catch(e) {
    return { transactions:[], lastUpdated:'—', source:'error' };
  }
}

/* ── FETCH ALL ── */
async function fetchAll() {
  setMsg('Connecting to Windsor…');
  await new Promise(r => {
    const check = () => window.fetch ? r() : setTimeout(check, 100);
    check();
  });
  setMsg('Loading data…');
  // Fixed 12-week window for Weekly KPIs section (always latest 84 days)
  const wkFrom = daysAgo(84), wkTo = yesterday();
  const [ghlR, gadsR, ga4R, kwR, salesR, ghlWkR, gadsWkR] = await Promise.allSettled([
    windsorFetch('gohighlevel', GHL_ACC,  ['contact_date_added','contact_source','contact_id']),
    windsorFetch('google_ads',  GADS_ACC, ['date','campaign','spend','clicks','impressions','conversions','ctr','cpc','account_id']),
    windsorFetch('googleanalytics4', GA4_ACC, ['date','sessions','users','session_default_channel_group','country']),
    windsorFetch('google_ads',  GADS_ACC, ['keyword','match_type','clicks','impressions','ctr','cpc','conversions','spend','account_id']),
    fetchSalesData(),
    windsorFetch('gohighlevel', GHL_ACC,  ['contact_date_added','contact_source','contact_id'], wkFrom, wkTo),
    windsorFetch('google_ads',  GADS_ACC, ['date','spend','account_id'], wkFrom, wkTo)
  ]);
  const filterGAds = rows => rows.filter(r => !r.account_id || r.account_id===GADS_ACC);
  return {
    ghl:        ghlR.status==='fulfilled'    ? ghlR.value                 : [],
    gads:       gadsR.status==='fulfilled'   ? filterGAds(gadsR.value)    : [],
    ga4:        ga4R.status==='fulfilled'    ? ga4R.value                 : [],
    keywords:   kwR.status==='fulfilled'     ? filterGAds(kwR.value)      : [],
    salesData:  salesR.status==='fulfilled'  ? salesR.value               : { transactions:[], lastUpdated:'—', source:'error' },
    ghlWeekly:  ghlWkR.status==='fulfilled'  ? ghlWkR.value               : [],
    gadsWeekly: gadsWkR.status==='fulfilled' ? filterGAds(gadsWkR.value)  : []
  };
}

/* ── PROCESS ── */
function classifySource(src) {
  if (!src) return 'call';
  const s=src.toLowerCase();
  if (s.includes('pool')||s.includes('number pool')||s.includes('call')) return 'call';
  if (s.includes('landing')||s.includes('survey')||s.includes('form')||s.includes('quiz')||s.includes('external')) return 'form';
  return 'unknown';
}

function processGHL(rows) {
  const minBkt={};
  rows.forEach(r=>{ if(!r.contact_source){const m=(r.contact_date_added||'').slice(0,16);minBkt[m]=(minBkt[m]||0)+1;}});
  const bulkMins=new Set(Object.keys(minBkt).filter(m=>minBkt[m]>=5));
  const daily={},sources={};
  let calls=0,forms=0,unknown=0;
  rows.forEach(r=>{
    const m=(r.contact_date_added||'').slice(0,16);
    if(!r.contact_source&&bulkMins.has(m)) return;
    const day=(r.contact_date_added||'').slice(0,10);
    if(!day) return;
    if(!daily[day]) daily[day]={call:0,form:0,unknown:0};
    const t=classifySource(r.contact_source);
    daily[day][t]++;
    sources[r.contact_source||'Inbound Call']=(sources[r.contact_source||'Inbound Call']||0)+1;
    if(t==='call') calls++; else if(t==='form') forms++; else unknown++;
  });
  return {daily,sources,calls,forms,unknown,total:calls+forms+unknown};
}

function processGAds(rows) {
  const daily={},campaigns={};
  let spend=0,clicks=0,impr=0,conv=0;
  rows.forEach(r=>{
    const d=r.date;
    if(!daily[d]) daily[d]={spend:0,clicks:0,impr:0,conv:0};
    daily[d].spend+=+r.spend||0; daily[d].clicks+=+r.clicks||0;
    daily[d].impr+=+r.impressions||0; daily[d].conv+=+r.conversions||0;
    const c=r.campaign;
    if(!campaigns[c]) campaigns[c]={spend:0,clicks:0,impr:0,conv:0};
    campaigns[c].spend+=+r.spend||0; campaigns[c].clicks+=+r.clicks||0;
    campaigns[c].impr+=+r.impressions||0; campaigns[c].conv+=+r.conversions||0;
    spend+=+r.spend||0; clicks+=+r.clicks||0; impr+=+r.impressions||0; conv+=+r.conversions||0;
  });
  return {daily,campaigns,spend,clicks,impr,conv,ctr:impr>0?clicks/impr:0,cpc:clicks>0?spend/clicks:0,cpa:conv>0?spend/conv:0};
}

function processGA4(rows) {
  const channels={},countries={},daily={};
  let sessions=0,users=0;
  rows.forEach(r=>{
    const ch=r.session_default_channel_group||'Other';
    channels[ch]=(channels[ch]||0)+(+r.sessions||0);
    countries[r.country]=(countries[r.country]||0)+(+r.sessions||0);
    daily[r.date]=(daily[r.date]||0)+(+r.sessions||0);
    sessions+=+r.sessions||0; users+=+r.users||0;
  });
  return {channels,countries,daily,sessions,users};
}

function processKeywords(rows) {
  const kw={};
  rows.forEach(r=>{
    if(!r.keyword) return;
    if(!kw[r.keyword]) kw[r.keyword]={clicks:0,impr:0,conv:0,spend:0,matchType:r.match_type};
    kw[r.keyword].clicks+=+r.clicks||0; kw[r.keyword].impr+=+r.impressions||0;
    kw[r.keyword].conv+=+r.conversions||0; kw[r.keyword].spend+=+r.spend||0;
  });
  return Object.entries(kw).sort((a,b)=>b[1].conv-a[1].conv);
}

function processSales(transactions, from, to) {
  const daily={}, byService={}, byFinder={}, byCloser={};
  let totalRevenue=0, totalDeals=0, totalPending=0, pendingDeals=0;

  // Filter to date range
  const filtered = transactions.filter(t => t.date >= from && t.date <= to);

  filtered.forEach(t => {
    if (!t.date) return;
    if (!daily[t.date]) daily[t.date]={revenue:0,pending:0,deals:0};
    const svc = t.service || categorizeService(t.product);
    if (!byService[svc]) byService[svc]={revenue:0,deals:0,pending:0,pendingDeals:0};

    if (t.isPaid) {
      daily[t.date].revenue += t.amount;
      daily[t.date].deals++;
      totalRevenue += t.amount;
      totalDeals++;
      byService[svc].revenue += t.amount;
      byService[svc].deals++;
      if (t.finder) { if(!byFinder[t.finder]) byFinder[t.finder]={revenue:0,deals:0}; byFinder[t.finder].revenue+=t.amount; byFinder[t.finder].deals++; }
      if (t.closer) { if(!byCloser[t.closer]) byCloser[t.closer]={revenue:0,deals:0}; byCloser[t.closer].revenue+=t.amount; byCloser[t.closer].deals++; }
    } else {
      daily[t.date].pending += t.amount;
      totalPending += t.amount;
      pendingDeals++;
      byService[svc].pending += t.amount;
      byService[svc].pendingDeals++;
    }
  });

  const avgDeal = totalDeals>0 ? totalRevenue/totalDeals : 0;
  return {daily, byService, byFinder, byCloser, totalRevenue, totalDeals, totalPending, pendingDeals, avgDeal};
}

/* ── WEEKLY KPIs ── */
function getWeeks(n) {
  const weeks=[];
  const now=new Date();
  const dow=now.getDay(); // 0=Sun
  const toMon=dow===0?-6:1-dow;
  const thisMon=new Date(now);
  thisMon.setDate(now.getDate()+toMon);
  thisMon.setHours(0,0,0,0);
  for(let w=0;w<n;w++){
    const mon=new Date(thisMon); mon.setDate(thisMon.getDate()-(7*w));
    const sun=new Date(mon); sun.setDate(mon.getDate()+6);
    const from=toISO(mon), to=toISO(sun);
    const lbl=mon.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+sun.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    weeks.push({from,to,label:lbl});
  }
  return weeks.reverse(); // oldest → newest
}

function processWeeklyKPIs(ghlWeeklyRows, gadsWeeklyRows, allTransactions) {
  const weeks=getWeeks(12);
  // GHL: apply bulk-import filter, get daily totals
  const ghlProc=processGHL(ghlWeeklyRows);
  // GAds: get daily spend
  const gadsProc=processGAds(gadsWeeklyRows);

  return weeks.map(w=>{
    let leads=0, spend=0;
    const cur=new Date(w.from), end=new Date(w.to);
    while(cur<=end){
      const d=toISO(cur);
      const dl=ghlProc.daily[d]||{call:0,form:0,unknown:0};
      leads+=dl.call+dl.form+dl.unknown;
      spend+=gadsProc.daily[d]?.spend||0;
      cur.setDate(cur.getDate()+1);
    }
    const weekTxns=allTransactions.filter(t=>t.isPaid&&t.date>=w.from&&t.date<=w.to);
    const revenue=weekTxns.reduce((s,t)=>s+t.amount,0);
    const deals=weekTxns.length;
    const cpl=(leads>0&&spend>0)?spend/leads:null;
    const cps=(deals>0&&spend>0)?spend/deals:null;
    const roas=spend>0?revenue/spend:null;
    return {...w,leads,spend,revenue,deals,cpl,cps,roas};
  }).reverse(); // newest first for the table
}

function categorizeService(p) {
  if (!p) return 'Other';
  const s=p.toLowerCase();
  if (/n-?400/.test(s)) return 'N-400 Citizenship';
  if (/i-?130/.test(s)) return 'I-130 Family Sponsorship';
  if (/i-?90/.test(s))  return 'I-90 Green Card Renewal';
  if (s.includes('all at once')) return 'All at Once Bundle';
  if (s.includes('nvc')) return 'NVC Processing';
  if (s.includes('daca')) return 'DACA';
  if (/i-?601/.test(s)||s.includes('waiver')) return 'I-601A Waiver';
  if (/i-?751/.test(s)) return 'I-751 Removal of Conditions';
  if (s.includes('crba')) return 'CRBA';
  if (/n-?600/.test(s)) return 'N-600 Certificate';
  if (s.includes('foia')) return 'FOIA';
  if (/i-?485/.test(s)) return 'I-485 Adjustment';
  if (s.includes('eb-5')||s.includes('eb5')) return 'EB-5 Investor Visa';
  if (s.includes('parole')) return 'Parole in Place';
  if (/i-?131/.test(s)) return 'I-131 Travel Doc';
  if (/n-?565/.test(s)) return 'N-565';
  if (s.includes('k1')||s.includes('fiance')||/i-?129f/.test(s)) return 'K-1 Fiancé Visa';
  if (s.includes('translation')) return 'Translation';
  if (s.includes('visa fee')) return 'Visa Fees';
  if (s.includes('appeal')||s.includes('rfe')) return 'Appeals/RFE';
  return 'Other';
}

function roasPill(roas) {
  if (roas===null||roas===undefined) return '<span class="roas-pill roas-mid">—</span>';
  if (roas >= 5) return `<span class="roas-pill roas-high">${roas.toFixed(1)}x</span>`;
  if (roas >= 2) return `<span class="roas-pill roas-mid">${roas.toFixed(1)}x</span>`;
  return `<span class="roas-pill roas-low">${roas.toFixed(1)}x</span>`;
}

/* ── FORMAT ── */
const fmt = {
  $:   v => '$'+Number(v).toLocaleString('en-US',{maximumFractionDigits:0}),
  $2:  v => '$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}),
  $1:  v => '$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1}),
  n:   (v,d=0) => Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}),
  pct: v => (v*100).toFixed(1)+'%',
  pct0:v => (v*100).toFixed(0)+'%',
  x:   v => v!=null ? v.toFixed(2)+'x' : '—'
};

/* ── INSIGHTS ── */
function makeInsights(ghl, gads, ga4, sales, avgRoas) {
  const out=[];
  if (sales.totalRevenue>0) {
    out.push({icon:'💰',text:`Revenue: <strong>${fmt.$(sales.totalRevenue)}</strong> across <strong>${sales.totalDeals} deals</strong> (avg ${fmt.$(sales.avgDeal)}/deal). Pipeline: <strong>${fmt.$(sales.totalPending)}</strong> pending.`});
  }
  if (avgRoas>0) {
    const q=avgRoas>=5?'excellent — strong signal to scale spend':avgRoas>=3?'solid — room to scale profitable campaigns':'below target — optimize before scaling';
    out.push({icon:'📈',text:`Overall ROAS: <strong>${fmt.x(avgRoas)}</strong> — ${q}.`});
  }
  const topSvc=Object.entries(sales.byService).sort((a,b)=>b[1].revenue-a[1].revenue)[0];
  if(topSvc){
    const pct=sales.totalRevenue>0?(topSvc[1].revenue/sales.totalRevenue*100).toFixed(0):0;
    out.push({icon:'🏆',text:`Top service: <strong>${topSvc[0]}</strong> — ${fmt.$(topSvc[1].revenue)} (${pct}% of revenue, ${topSvc[1].deals} deals, avg ${fmt.$(topSvc[1].deals>0?topSvc[1].revenue/topSvc[1].deals:0)}/deal).`});
  }
  const topCloser=Object.entries(sales.byCloser).sort((a,b)=>b[1].revenue-a[1].revenue)[0];
  if(topCloser) out.push({icon:'🤝',text:`Top closer: <strong>${topCloser[0]}</strong> — ${fmt.$(topCloser[1].revenue)} across ${topCloser[1].deals} deals.`});
  if (gads.conv>0) out.push({icon:'📊',text:`Google Ads: <strong>${fmt.n(gads.conv,0)} conversions</strong> · CPA ${fmt.$1(gads.cpa)} · Spend ${fmt.$(gads.spend)} · CTR ${fmt.pct(gads.ctr)}.`});
  if (ghl.total>0){const cp=(ghl.calls/ghl.total*100).toFixed(0);out.push({icon:'📞',text:`GHL: <strong>${ghl.total} leads</strong> — ${ghl.calls} calls (${cp}%) · ${ghl.forms} form submissions.`});}
  if (out.length===0) out.push({icon:'ℹ️',text:'No data available for the selected date range.'});
  return out;
}

/* ── TABLE SORTING ── */
function parseCell(cell) {
  if (cell.dataset && cell.dataset.sort) return cell.dataset.sort;
  let t = cell.textContent.trim().replace(/[$,]/g, '');
  if (t === '—' || t === '') return null;
  t = t.replace(/%$/, '').replace(/x$/, '');
  const n = parseFloat(t);
  return isNaN(n) ? t.toLowerCase() : n;
}

function makeTableSortable(table) {
  const ths = table.querySelectorAll('thead th');
  ths.forEach((th, ci) => {
    th.classList.add('sortable');
    let descending = true;
    th.addEventListener('click', () => {
      ths.forEach(t => t.classList.remove('sort-asc', 'sort-desc'));
      th.classList.add(descending ? 'sort-desc' : 'sort-asc');
      const tbody = table.querySelector('tbody');
      if (!tbody) return;
      const rows = Array.from(tbody.querySelectorAll('tr'));
      rows.sort((a, b) => {
        const av = parseCell(a.cells[ci]);
        const bv = parseCell(b.cells[ci]);
        if (av === null) return 1;
        if (bv === null) return -1;
        if (typeof av === 'string' && typeof bv === 'string')
          return descending ? bv.localeCompare(av) : av.localeCompare(bv);
        return descending ? bv - av : av - bv;
      });
      rows.forEach(r => tbody.appendChild(r));
      descending = !descending;
    });
  });
}

function makeAllTablesSortable() {
  document.querySelectorAll('table').forEach(t => makeTableSortable(t));
}

/* ── DATE CONTROLS ── */
function setPreset(p) {
  dateConfig.preset=p;
  if(p==='yesterday')      {dateConfig.from=yesterday();dateConfig.to=yesterday();}
  else if(p==='today')     {dateConfig.from=today();    dateConfig.to=today();}
  else if(p==='last_7d')   {dateConfig.from=daysAgo(7); dateConfig.to=yesterday();}
  else if(p==='last_30d')  {dateConfig.from=daysAgo(30);dateConfig.to=yesterday();}
  if(p!=='custom') reload();
  else {
    document.querySelectorAll('.date-preset-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.date-preset-btn')[4].classList.add('active');
    const w=document.getElementById('custom-wrap');
    if(w) w.classList.add('visible');
  }
}
function applyCustom() {
  const f=document.getElementById('date-from')?.value;
  const t=document.getElementById('date-to')?.value;
  if(!f||!t) return;
  dateConfig.from=f; dateConfig.to=t; dateConfig.preset='custom';
  reload();
}

/* ── INIT ── */
function setMsg(t){const e=document.getElementById('load-msg');if(e)e.textContent=t;}

async function reload() {
  destroyCharts();
  document.getElementById('app').innerHTML=`<div class="center-box"><div class="spinner"></div><div class="loading-label" id="load-msg">Loading…</div></div>`;
  try {
    const {ghl,gads,ga4,keywords,salesData,ghlWeekly,gadsWeekly}=await fetchAll();
    renderApp(ghl,gads,ga4,keywords,salesData,ghlWeekly,gadsWeekly);
  } catch(e) {
    document.getElementById('app').innerHTML=`<div class="center-box"><div class="error-box">❌ Error: <strong>${e.message}</strong></div><button class="btn" onclick="reload()" style="margin-top:16px">↻ Retry</button></div>`;
  }
}

window.addEventListener('load', reload);
